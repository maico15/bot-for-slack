  - id: white_screen_refresh
    priority: 90
    patterns:
      - 'white screen'
      - 'blank screen'
      - 'blank page'
      - '\bblank\b'
      - '\bfrozen\b'
      - 'page.*not.*load'
      - 'stuck.*load'
      - 'loading.*forever'
      - '\bloading\b'
    reply_template: |-
      *White Screen / Page Not Loading*
      Try these steps:
      1. *Hard refresh:* `Ctrl+Shift+R` (Windows) / `Cmd+Shift+R` (Mac)
      2. Open in *Incognito* (`Ctrl+Shift+N`) — if it loads there, a browser extension is the likely cause
      3. Disable extensions one by one to identify the culprit
      4. Clear browser cache if Incognito resolves it

      Please reply with the details below (copy/paste and fill in):

      - Browser + version:
        (Example: "Chrome 122.0", "Edge 121", "Firefox 123". You can find it in Menu → Help → About.)

