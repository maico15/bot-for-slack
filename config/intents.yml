# ---------------------------------------------------------------------------
# Intent definitions for System Assistant
#
# Fields:
#   id             – unique identifier (used in metrics / stats)
#   priority       – lower number = matched first
#   patterns       – JavaScript RegExp strings, case-insensitive (flag: i)
#                    Use single-quoted YAML strings so \b is a literal backslash
#                    (regex word boundary), not a YAML escape.
#   reply_template – English-only Slack mrkdwn text shown in the thread reply.
#                    Uses YAML literal block (|-) to preserve newlines and
#                    bullet formatting.
#   escalation     – if true, an escalation DM is sent to ESCALATION_USER_ID
# ---------------------------------------------------------------------------

intents:

  - id: audio_permission_denied
    priority: 60
    patterns:
      - 'microphone.*permission'
      - 'audio.*permission'
      - 'permission.*denied'
      - 'mic.*denied'
      - 'mic.*blocked'
      - 'microphone.*blocked'
      - '\bno microphone\b'
    reply_template: |-
      *Microphone / Audio Permission Denied*
      Try these steps:
      1. Click the *lock icon* in the address bar → set Microphone to *Allow*
      2. Refresh the page after granting permission
      3. If blocked by browser policy, check `chrome://settings/content/microphone`

      Please reply with the details below (copy/paste and fill in):

      - Browser + version:
        (Example: "Chrome 122.0", "Edge 121", "Firefox 123". You can find it in Menu → Help → About.)

      - Incognito tried: Y / N
        (Did you try opening Flex/Twilio in an Incognito/Private window to rule out cache/session issues?)

      - Extensions disabled: Y / N
        (Did you try disabling browser extensions like adblockers, security tools, password managers, etc., or testing in a clean browser profile?)

      - Error text or screenshot:
        (Paste the exact error message if you see one, or attach a screenshot. If it's just a blank/white screen, say "white screen" and when it happens.)

      - When did it start (time + timezone):
        (Example: "Started 09:10 AM PST" / "Started 14:30 UTC".)

      - How many agents are affected:
        (Example: "Only me" / "3 agents" / "Everyone in the queue".)
    escalation: false

  - id: attempting_reconnect
    priority: 65
    patterns:
      - 'attempting.*reconnect'
      - '\breconnecting\b'
      - 'connection.*lost'
      - 'keeps.*disconnect'
      - 'keeps.*drop'
      - '\bdisconnecting\b'
    reply_template: |-
      *Attempting Reconnect / Keeps Disconnecting*
      Try these steps:
      1. Check network stability — switch to a *wired connection* if on Wi-Fi
      2. Refresh Flex (do not close the tab mid-call)
      3. Open in Incognito (`Ctrl+Shift+N`) to rule out extension interference

      Please reply with the details below (copy/paste and fill in):

      - Browser + version:
        (Example: "Chrome 122.0", "Edge 121", "Firefox 123". You can find it in Menu → Help → About.)

      - Incognito tried: Y / N
        (Did you try opening Flex/Twilio in an Incognito/Private window to rule out cache/session issues?)

      - Extensions disabled: Y / N
        (Did you try disabling browser extensions like adblockers, security tools, password managers, etc., or testing in a clean browser profile?)

      - Error text or screenshot:
        (Paste the exact error message if you see one, or attach a screenshot. If it's just a blank/white screen, say "white screen" and when it happens.)

      - When did it start (time + timezone):
        (Example: "Started 09:10 AM PST" / "Started 14:30 UTC".)

      - How many agents are affected:
        (Example: "Only me" / "3 agents" / "Everyone in the queue".)
    escalation: false

  - id: packet_loss
    priority: 70
    patterns:
      - 'packet loss'
      - '\bjitter\b'
      - '\blatency\b'
      - '\bchoppy\b'
      - 'poor audio'
      - 'audio.*quality'
      - '\bcrackling\b'
      - 'static.*call'
      - 'call.*static'
    reply_template: |-
      *Audio / Network Quality Issue*
      Try these steps:
      1. Run the *Twilio Network Test* and note the results
      2. Switch to a *wired connection* if on Wi-Fi
      3. Close any bandwidth-heavy apps or browser tabs
      4. Refresh Flex in Incognito and retest audio

      Please reply with the details below (copy/paste and fill in):

      - Browser + version:
        (Example: "Chrome 122.0", "Edge 121", "Firefox 123". You can find it in Menu → Help → About.)

      - Incognito tried: Y / N
        (Did you try opening Flex/Twilio in an Incognito/Private window to rule out cache/session issues?)

      - Extensions disabled: Y / N
        (Did you try disabling browser extensions like adblockers, security tools, password managers, etc., or testing in a clean browser profile?)

      - Error text or screenshot:
        (Paste the exact error message if you see one, or attach a screenshot. If it's just a blank/white screen, say "white screen" and when it happens.)

      - When did it start (time + timezone):
        (Example: "Started 09:10 AM PST" / "Started 14:30 UTC".)

      - How many agents are affected:
        (Example: "Only me" / "3 agents" / "Everyone in the queue".)

      - Twilio Network Test results:
        (Run https://networktest.twilio.com and paste: Latency (ms) / Jitter (ms) / Packet loss (%).)
    escalation: false

  - id: agent_not_eligible_45301
    priority: 75
    patterns:
      - '45301'
      - 'not eligible'
      - 'agent.*eligib'
      - 'eligib.*error'
    reply_template: |-
      *Error 45301 — Agent Not Eligible*
      Try these steps:
      1. Log out of Flex completely, wait 10 seconds, then log back in
      2. Confirm agent status is set to *Available* (not Offline or Busy)
      3. Open in Incognito and retry

      Please reply with the details below (copy/paste and fill in):

      - Browser + version:
        (Example: "Chrome 122.0", "Edge 121", "Firefox 123". You can find it in Menu → Help → About.)

      - Incognito tried: Y / N
        (Did you try opening Flex/Twilio in an Incognito/Private window to rule out cache/session issues?)

      - Extensions disabled: Y / N
        (Did you try disabling browser extensions like adblockers, security tools, password managers, etc., or testing in a clean browser profile?)

      - Error text or screenshot:
        (Paste the exact error message if you see one, or attach a screenshot. If it's just a blank/white screen, say "white screen" and when it happens.)

      - When did it start (time + timezone):
        (Example: "Started 09:10 AM PST" / "Started 14:30 UTC".)

      - How many agents are affected:
        (Example: "Only me" / "3 agents" / "Everyone in the queue".)

      - Agent status at the time of the error:
        (Example: "Available", "Offline", "Busy".)

      - Skills / queues assigned to the affected agent(s):
        (List the skill or queue names shown in the Flex admin panel.)
    escalation: false

  - id: outbound_call_error
    priority: 80
    patterns:
      - 'outbound.*call'
      - 'outbound.*error'
